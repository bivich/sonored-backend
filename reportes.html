<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonoRed — Reportería</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #fc5c7c;
    --accent3: #5cfcb4;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  }

  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--accent); }
    50% { box-shadow: 0 0 20px var(--accent); }
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .server-url-display {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px;
    max-width: 280px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Config bar ── */
  .config-bar {
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }

  .config-bar label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  .config-bar input, .config-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px; border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-bar input:focus, .config-bar select:focus {
    border-color: var(--accent);
  }

  .config-bar input[type="url"] { width: 280px; }
  .config-bar input[type="date"] { width: 150px; }

  .btn {
    font-family: var(--font-display);
    font-weight: 700; font-size: 13px;
    padding: 9px 20px; border-radius: 8px;
    border: none; cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #9a7eff; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Tab nav ── */
  .tab-nav {
    display: flex; gap: 4px;
    padding: 20px 32px 0;
  }

  .tab-btn {
    font-family: var(--font-display);
    font-weight: 600; font-size: 13px;
    padding: 10px 20px; border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    position: relative; bottom: -1px;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }

  .tab-btn:not(.active):hover { color: var(--text); }

  /* ── Main content ── */
  main {
    padding: 0 32px 40px;
    border-top: 1px solid var(--border);
  }

  .tab-panel {
    display: none;
    padding-top: 28px;
  }
  .tab-panel.active { display: block; }

  /* ── KPI cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card:hover { border-color: var(--accent); }

  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
  }

  .kpi-label {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: var(--font-mono);
    font-size: 32px; font-weight: 700;
    line-height: 1;
    color: var(--text);
  }

  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── Chart ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .chart-title {
    font-size: 14px; font-weight: 700;
    color: var(--text); margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .chart-title span { font-size: 11px; color: var(--muted); font-weight: 400; }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 160px;
    padding-bottom: 28px;
    position: relative;
  }

  .bar-chart::after {
    content: '';
    position: absolute; bottom: 28px; left: 0; right: 0;
    height: 1px; background: var(--border);
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    cursor: pointer;
  }

  .bar:hover::after {
    content: attr(data-value);
    position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px; font-family: var(--font-mono);
    padding: 3px 7px; border-radius: 4px;
    white-space: nowrap; z-index: 10;
  }

  .bar-label {
    font-size: 9px; color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    text-align: center;
    transform: rotate(-40deg);
    transform-origin: top center;
    margin-top: 4px;
  }

  /* ── Table ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }

  table {
    width: 100%; border-collapse: collapse;
  }

  th {
    font-size: 11px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
    text-align: left;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 14px 20px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(124,92,252,0.04); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }

  .badge-online { background: rgba(92,252,180,0.12); color: var(--accent3); }
  .badge-offline { background: rgba(252,92,124,0.12); color: var(--accent2); }

  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }

  .plays-bar {
    display: flex; align-items: center; gap: 10px;
  }

  .plays-track {
    flex: 1; height: 4px;
    background: var(--border); border-radius: 2px;
    overflow: hidden;
  }

  .plays-fill {
    height: 100%; border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  .plays-num {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--text);
    min-width: 40px; text-align: right;
  }

  /* ── Summary export ── */
  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  }

  @media (max-width: 768px) {
    .summary-grid { grid-template-columns: 1fr; }
    .config-bar { flex-direction: column; align-items: flex-start; }
    .config-bar input[type="url"] { width: 100%; }
    header { padding: 16px; }
    main { padding: 0 16px 40px; }
    .tab-nav { padding: 20px 16px 0; overflow-x: auto; }
  }

  /* ── Loading / empty ── */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }

  .loading::before {
    content: '';
    display: block; width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent3);
    padding: 12px 18px; border-radius: 8px;
    font-size: 13px; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Export btn ── */
  .export-section {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-bottom: 20px;
  }

  /* ── Top campaigns list ── */
  .top-list { list-style: none; }
  .top-list li {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(42,42,58,0.5);
  }
  .top-list li:last-child { border-bottom: none; }

  .top-rank {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--muted);
    width: 20px; text-align: center;
  }

  .top-info { flex: 1; }
  .top-name { font-size: 13px; font-weight: 600; }
  .top-brand { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .top-plays {
    font-family: var(--font-mono);
    font-size: 18px; font-weight: 700;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      SonoRed <span style="color:var(--muted);font-weight:400;font-size:16px;margin-left:4px">/ Reportería</span>
    </div>
    <div class="header-right">
      <div class="server-url-display" id="urlDisplay">Sin conectar</div>
    </div>
  </header>

  <div class="config-bar">
    <label>Servidor</label>
    <input type="url" id="serverUrl" placeholder="https://tu-app.up.railway.app" />

    <label>Desde</label>
    <input type="date" id="dateFrom" />

    <label>Hasta</label>
    <input type="date" id="dateTo" />

    <label>Vista</label>
    <select id="viewMode">
      <option value="all">Todas las marcas</option>
    </select>

    <button class="btn btn-primary" onclick="loadAll()">Actualizar</button>
    <button class="btn btn-outline" onclick="exportCSV()">Exportar CSV</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('campaigns', this)">📊 Por Campaña</button>
    <button class="tab-btn" onclick="switchTab('speakers', this)">📡 Por Parlante</button>
    <button class="tab-btn" onclick="switchTab('summary', this)">📋 Resumen Ejecutivo</button>
  </div>

  <main>
    <!-- Tab: Campañas -->
    <div class="tab-panel active" id="tab-campaigns">
      <div class="kpi-grid" id="kpi-campaigns"></div>
      <div class="chart-card">
        <div class="chart-title">Reproducciones por día <span id="chart-range-label"></span></div>
        <div class="bar-chart" id="chart-campaigns"></div>
      </div>
      <div class="table-card">
        <div class="table-header">
          Detalle por campaña
          <span id="campaign-count" style="font-size:12px;color:var(--muted);font-weight:400"></span>
        </div>
        <div id="campaigns-table"></div>
      </div>
    </div>

    <!-- Tab: Parlantes -->
    <div class="tab-panel" id="tab-speakers">
      <div class="kpi-grid" id="kpi-speakers"></div>
      <div class="table-card">
        <div class="table-header">Parlantes / Tiendas</div>
        <div id="speakers-table"></div>
      </div>
    </div>

    <!-- Tab: Resumen ejecutivo -->
    <div class="tab-panel" id="tab-summary">
      <div class="export-section">
        <button class="btn btn-outline" onclick="printSummary()">🖨 Imprimir / PDF</button>
      </div>
      <div class="kpi-grid" id="kpi-summary"></div>
      <div class="summary-grid">
        <div class="chart-card">
          <div class="chart-title">Tendencia de reproducciones</div>
          <div class="bar-chart" id="chart-summary"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Top campañas del período</div>
          <ul class="top-list" id="top-campaigns-list"></ul>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Estado ───────────────────────────────────────────────────────────────────
let SERVER = localStorage.getItem('sonored_url') || '';
let campaignsData = [];
let speakersData = [];
let summaryData = null;

// ─── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  // Fechas por defecto: últimos 30 días
  const today = new Date();
  const month = new Date(today); month.setDate(today.getDate() - 30);
  document.getElementById('dateTo').value = today.toISOString().slice(0,10);
  document.getElementById('dateFrom').value = month.toISOString().slice(0,10);

  if (SERVER) {
    document.getElementById('serverUrl').value = SERVER;
    document.getElementById('urlDisplay').textContent = SERVER;
    loadAll();
  }
};

function getServer() {
  const val = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
  if (val) {
    SERVER = val;
    localStorage.setItem('sonored_url', val);
    document.getElementById('urlDisplay').textContent = val;
  }
  return SERVER;
}

function getDateRange() {
  return {
    from: document.getElementById('dateFrom').value,
    to: document.getElementById('dateTo').value
  };
}

// ─── Fetch ────────────────────────────────────────────────────────────────────
async function api(path) {
  const base = getServer();
  if (!base) { showToast('⚠️ Ingresa la URL del servidor'); return null; }
  try {
    const r = await fetch(base + path);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch(e) {
    showToast('❌ Error: ' + e.message);
    return null;
  }
}

async function loadAll() {
  const { from, to } = getDateRange();
  const qs = `?from=${from}&to=${to}`;

  // Carga paralela
  const [camps, speakers, summary] = await Promise.all([
    api('/api/reports/campaigns' + qs),
    api('/api/reports/speakers' + qs),
    api('/api/reports/summary' + qs)
  ]);

  if (camps) { campaignsData = camps; renderCampaigns(); }
  if (speakers) { speakersData = speakers; renderSpeakers(); }
  if (summary) { summaryData = summary; renderSummary(); }

  // Llenar selector de marcas
  if (camps) {
    const brands = [...new Set(camps.map(c => c.brand).filter(Boolean))];
    const sel = document.getElementById('viewMode');
    sel.innerHTML = '<option value="all">Todas las marcas</option>';
    brands.forEach(b => {
      const o = document.createElement('option'); o.value = b; o.textContent = b;
      sel.appendChild(o);
    });
  }
}

// ─── Render Campañas ───────────────────────────────────────────────────────────
function renderCampaigns() {
  const data = campaignsData;
  const totalPlays = data.reduce((s, c) => s + c.playsInRange, 0);
  const maxPlays = Math.max(...data.map(c => c.playsInRange), 1);

  // KPIs
  document.getElementById('kpi-campaigns').innerHTML = `
    <div class="kpi-card" style="--accent-color: var(--accent)">
      <div class="kpi-label">Total reproducciones</div>
      <div class="kpi-value">${totalPlays.toLocaleString()}</div>
      <div class="kpi-sub">en el período seleccionado</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent2)">
      <div class="kpi-label">Campañas activas</div>
      <div class="kpi-value">${data.filter(c => c.playsInRange > 0).length}</div>
      <div class="kpi-sub">de ${data.length} en total</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent3)">
      <div class="kpi-label">Promedio diario</div>
      <div class="kpi-value">${totalPlays > 0 ? Math.round(totalPlays / 30) : 0}</div>
      <div class="kpi-sub">reproducciones/día</div>
    </div>
    <div class="kpi-card" style="--accent-color: #fcdc5c">
      <div class="kpi-label">Mejor campaña</div>
      <div class="kpi-value" style="font-size:18px;padding-top:4px">${data[0] ? data[0].name.slice(0,18) : '—'}</div>
      <div class="kpi-sub">${data[0] ? data[0].playsInRange + ' plays' : ''}</div>
    </div>
  `;

  // Chart: combinar todos los días
  const allDays = {};
  data.forEach(c => c.byDay.forEach(d => { allDays[d.date] = (allDays[d.date] || 0) + d.plays; }));
  renderBarChart('chart-campaigns', Object.entries(allDays).sort((a,b) => a[0].localeCompare(b[0])), '#7c5cfc');

  // Table
  document.getElementById('campaign-count').textContent = `${data.length} campañas`;
  if (data.length === 0) {
    document.getElementById('campaigns-table').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Sin datos en este período</div>';
    return;
  }
  document.getElementById('campaigns-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Campaña</th>
          <th>Marca</th>
          <th>Reproducciones (período)</th>
          <th>Total histórico</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(c => `
          <tr>
            <td style="font-weight:600">${c.name}</td>
            <td style="color:var(--muted)">${c.brand || '—'}</td>
            <td>
              <div class="plays-bar">
                <div class="plays-track"><div class="plays-fill" style="width:${Math.round(c.playsInRange/maxPlays*100)}%"></div></div>
                <div class="plays-num">${c.playsInRange.toLocaleString()}</div>
              </div>
            </td>
            <td style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${c.totalPlays.toLocaleString()}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ─── Render Parlantes ─────────────────────────────────────────────────────────
function renderSpeakers() {
  const data = speakersData;
  const online = data.filter(s => s.online).length;
  const total = data.length;
  const totalPlays = data.reduce((s, sp) => s + sp.playsInRange, 0);
  const maxPlays = Math.max(...data.map(s => s.playsInRange), 1);

  document.getElementById('kpi-speakers').innerHTML = `
    <div class="kpi-card" style="--accent-color: var(--accent3)">
      <div class="kpi-label">Parlantes online</div>
      <div class="kpi-value" style="color:var(--accent3)">${online}</div>
      <div class="kpi-sub">de ${total} registrados</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent)">
      <div class="kpi-label">Plays totales (período)</div>
      <div class="kpi-value">${totalPlays.toLocaleString()}</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent2)">
      <div class="kpi-label">Parlantes inactivos</div>
      <div class="kpi-value" style="color:var(--accent2)">${data.filter(s => s.playsInRange === 0).length}</div>
      <div class="kpi-sub">0 reproducciones en período</div>
    </div>
  `;

  if (data.length === 0) {
    document.getElementById('speakers-table').innerHTML = '<div class="empty"><div class="empty-icon">📡</div>Sin parlantes registrados aún</div>';
    return;
  }

  document.getElementById('speakers-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Parlante / ID</th>
          <th>Circuito</th>
          <th>Estado</th>
          <th>Reproducciones (período)</th>
          <th>Última conexión</th>
          <th>Campañas reproducidas</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(s => `
          <tr>
            <td style="font-weight:700;font-family:var(--font-mono);font-size:12px">${s.name}</td>
            <td style="color:var(--muted);font-size:12px">${s.circuit}</td>
            <td>
              <span class="badge ${s.online ? 'badge-online' : 'badge-offline'}">
                <span class="badge-dot"></span>${s.online ? 'Online' : 'Offline'}
              </span>
            </td>
            <td>
              <div class="plays-bar">
                <div class="plays-track"><div class="plays-fill" style="width:${Math.round(s.playsInRange/maxPlays*100)}%"></div></div>
                <div class="plays-num">${s.playsInRange.toLocaleString()}</div>
              </div>
            </td>
            <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
              ${s.lastSeen ? new Date(s.lastSeen).toLocaleString('es-EC', {dateStyle:'short',timeStyle:'short'}) : '—'}
            </td>
            <td style="font-size:12px;color:var(--muted)">
              ${s.campaigns.map(c => `<span title="${c.plays} plays">${c.brand}</span>`).join(', ') || '—'}
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ─── Render Resumen ───────────────────────────────────────────────────────────
function renderSummary() {
  const d = summaryData;
  if (!d) return;

  const fromStr = new Date(d.period.from).toLocaleDateString('es-EC');
  const toStr = new Date(d.period.to).toLocaleDateString('es-EC');
  const days = Math.round((new Date(d.period.to) - new Date(d.period.from)) / 86400000);

  document.getElementById('kpi-summary').innerHTML = `
    <div class="kpi-card" style="--accent-color: var(--accent)">
      <div class="kpi-label">Reproducciones totales</div>
      <div class="kpi-value">${d.totalPlays.toLocaleString()}</div>
      <div class="kpi-sub">${fromStr} — ${toStr}</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent3)">
      <div class="kpi-label">Puntos de venta activos</div>
      <div class="kpi-value" style="color:var(--accent3)">${d.uniqueSpeakers}</div>
      <div class="kpi-sub">con al menos 1 reproducción</div>
    </div>
    <div class="kpi-card" style="--accent-color: #fcdc5c">
      <div class="kpi-label">Campañas en aire</div>
      <div class="kpi-value">${d.activeCampaigns}</div>
    </div>
    <div class="kpi-card" style="--accent-color: var(--accent2)">
      <div class="kpi-label">Promedio diario</div>
      <div class="kpi-value">${days > 0 ? Math.round(d.totalPlays / days) : d.totalPlays}</div>
      <div class="kpi-sub">reproducciones/día</div>
    </div>
  `;

  renderBarChart('chart-summary', d.byDay.map(x => [x.date, x.plays]), '#5cfcb4');

  const list = document.getElementById('top-campaigns-list');
  if (!d.topCampaigns || d.topCampaigns.length === 0) {
    list.innerHTML = '<li style="color:var(--muted);padding:20px 0">Sin datos en este período</li>';
    return;
  }
  list.innerHTML = d.topCampaigns.map((c, i) => `
    <li>
      <div class="top-rank">${i + 1}</div>
      <div class="top-info">
        <div class="top-name">${c.name}</div>
        <div class="top-brand">${c.brand}</div>
      </div>
      <div class="top-plays">${c.plays.toLocaleString()}</div>
    </li>
  `).join('');
}

// ─── Bar chart ────────────────────────────────────────────────────────────────
function renderBarChart(containerId, entries, color) {
  const container = document.getElementById(containerId);
  if (!entries || entries.length === 0) {
    container.innerHTML = '<div class="empty" style="width:100%;padding:30px">Sin datos para graficar</div>';
    return;
  }

  // Mostrar máximo 30 columnas
  const show = entries.slice(-30);
  const max = Math.max(...show.map(e => e[1]), 1);

  container.innerHTML = show.map(([date, plays]) => {
    const pct = Math.round(plays / max * 100);
    const label = date.slice(5); // MM-DD
    return `
      <div class="bar-col">
        <div class="bar" style="height:${Math.max(pct, 1)}%;background:${color};opacity:0.85" data-value="${plays}"></div>
        <div class="bar-label">${label}</div>
      </div>
    `;
  }).join('');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ─── Export CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
  if (!campaignsData.length) { showToast('No hay datos para exportar'); return; }
  const rows = [['Campaña', 'Marca', 'Plays (período)', 'Total histórico']];
  campaignsData.forEach(c => rows.push([c.name, c.brand, c.playsInRange, c.totalPlays]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `sonored-reporte-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✅ CSV descargado');
}

function printSummary() {
  window.print();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
